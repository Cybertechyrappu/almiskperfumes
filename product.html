<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | Al Misk Perfumes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav class="container">
      <a href="index.html" class="logo">Al Misk</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="collection.html">Collection</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
      <a href="cart.html" class="cart-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 01-8 0"></path>
        </svg>
        <span id="cart-count" class="cart-count" style="display: none;">0</span>
      </a>
    </nav>
  </header>

  <section class="product-detail">
    <div class="container" id="product-detail">
      <div>
        <img id="product-image" src="" alt="">
      </div>
      <div>
        <h1 id="product-name"></h1>
        <p class="category" id="product-category"></p>
        <p class="description" id="product-description"></p>
        
        <div class="size-select">
          <label>Size</label>
          <select id="size-select"></select>
        </div>
        
        <div class="quantity-select">
          <label>Quantity</label>
          <div class="quantity-controls">
            <button onclick="document.getElementById('quantity').value = Math.max(1, parseInt(document.getElementById('quantity').value) - 1)">-</button>
            <input type="number" id="quantity" value="1" min="1">
            <button onclick="document.getElementById('quantity').value = parseInt(document.getElementById('quantity').value) + 1">+</button>
          </div>
        </div>
        
        <button id="add-to-cart" class="btn" style="width: 100%;"></button>
        
        <p style="margin-top: 30px;"><a href="collection.html" style="color: var(--gold);">← Back to Collection</a></p>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2024 Al Misk Perfumes. All rights reserved.</p>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    document.getElementById('add-to-cart').addEventListener('click', function() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const product = products.find(p => p.slug === slug);
      if (!product) return;
      
      const size = document.getElementById('size-select').value;
      const qty = parseInt(document.getElementById('quantity').value) || 1;
      
      addToCart(product.id, size, qty);
    });
    
    document.getElementById('size-select').addEventListener('change', updatePrice);
    document.getElementById('quantity').addEventListener('input', updatePrice);
  </script>
</body>
</html>
