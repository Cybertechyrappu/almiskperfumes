<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Al Misk Perfumes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav class="container">
      <a href="index.html" class="logo">Al Misk</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="collection.html">Collection</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
      <a href="cart.html" class="cart-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 01-8 0"></path>
        </svg>
        <span id="cart-count" class="cart-count" style="display: none;">0</span>
      </a>
    </nav>
  </header>

  <section class="cart-page">
    <div class="container">
      <h1>Your Cart</h1>
      <div id="cart-items"></div>
      
      <div class="cart-summary">
        <div class="row">
          <span>Subtotal</span>
          <span id="cart-total">$0</span>
        </div>
        <div class="row">
          <span>Shipping</span>
          <span>Free</span>
        </div>
        <div class="row total">
          <span>Total</span>
          <span id="cart-total">$0</span>
        </div>
      </div>
      
      <a href="checkout.html" class="btn" style="display: block; text-align: center; margin-top: 30px;">Proceed to Checkout</a>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2024 Al Misk Perfumes. All rights reserved.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
